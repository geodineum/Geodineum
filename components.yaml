# Geodineum Component Registry — Chapter 1 Release
# ==================================================
# Defines all components, their dependencies, install locations,
# and GitHub repositories for automated fetching.
#
# Used by: install.sh, geodineum CLI

version: 1.0.0

# Production install root — all components install under here
install_root: /opt/geodineum

# Component definitions
components:

  # ─── Core Infrastructure ──────────────────────────────────

  valkey:
    description: "In-memory storage + message broker (Redis fork)"
    type: external
    required_by: [gnode-client, gnode-daemon]
    install_check: "systemctl is-active valkey-gnode"
    notes: "Not a Geodineum component — installed via package manager or Docker"

  gnode-daemon:
    description: "Geometric topology engine, stream processor, service discovery"
    type: service
    repo: geodineum/gNode
    branch: main
    install_path: gNode
    build_cmd: "cd daemon && cargo build --release"
    service_name: gnode-daemon
    requires: [valkey]
    provides: [topology, stream-processing, service-discovery, resilience-primitives]

  gnode-client:
    description: "PHP library for gNode daemon communication"
    type: library
    repo: geodineum/gNode-Client
    branch: main
    install_path: gNode-Client
    requires: [valkey]
    php_extensions: [redis, json]
    provides: [valkey-storage, stream-commands, topology-reading]

  # ─── Framework ────────────────────────────────────────────

  gcore:
    description: "Manager-of-managers PHP framework (WordPress/standalone)"
    type: framework
    repo: geodineum/gCore
    branch: main
    install_path: gCore
    requires: [gnode-client]
    optional: [gnode-daemon]
    php_extensions: [redis, json, mbstring, igbinary, zlib]
    provides: [seo, analytics, security, cookie-consent, pwa-manifest,
               optimization, state-management, template-rendering]
    wp_integration: mu-plugin

  # ─── Themes ───────────────────────────────────────────────

  gtemplate-wp:
    description: "WordPress parent theme — shared bootstrap, rendering, REST, integrations"
    type: parent-theme
    repo: geodineum/gTemplate
    branch: main
    install_path: gTemplate
    requires: [gcore]
    provides: [9-phase-bootstrap, 3-tier-rendering, filter-hook-api,
               customizer, rest-api, content-sources]
    wp_integration: theme

  gcube:
    description: "3D CSS cube child theme (6 faces)"
    type: child-theme
    repo: geodineum/gCube
    branch: main
    install_path: gCube
    requires: [gtemplate-wp]
    wp_integration: theme
    face_count: 6
    geometry: css-3d-transforms

  # ─── Services ─────────────────────────────────────────────

  geodineum-comms:
    description: "Notification daemon (email, Telegram, SMS)"
    type: service
    repo: geodineum/Geodineum-COMMS
    branch: main
    install_path: Geodineum-COMMS
    build_cmd: "cargo build --release"
    service_name: geodineum-comms
    requires: [valkey]
    provides: [email-notifications, telegram-notifications, sms-notifications]

  geodineum-bak:
    description: "Ecosystem backup daemon (ValKey RDB, logs, site state)"
    type: service
    repo: geodineum/Geodineum-BAK
    branch: main
    install_path: Geodineum-BAK
    service_name: geodineum-bak
    requires: [valkey]
    provides: [valkey-backup, log-rotation, retention-policy]

# ─── Profiles ─────────────────────────────────────────────
# Pre-defined component sets for common use cases

profiles:

  minimal:
    description: "WordPress theme only, no real-time features"
    components: [gtemplate-wp, gcore, gnode-client]
    notes: "gCore runs in free-tier mode with stub managers"

  standard:
    description: "Full Chapter 1 stack with real-time topology and notifications"
    components: [valkey, gnode-daemon, gnode-client, gcore, gtemplate-wp, gcube, geodineum-comms, geodineum-bak]
