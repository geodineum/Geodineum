# Geodineum Component Registry
# =============================
# Defines all components, their dependencies, install locations,
# and GitHub repositories for automated fetching.
#
# Used by: scripts/install.sh, scripts/fetch-component.sh

version: 1.0.0

# Production install root — all components install under here
install_root: /opt/geodineum

# Component definitions
components:

  # ─── Core Infrastructure ──────────────────────────────────

  valkey:
    description: "In-memory storage + message broker (Redis fork)"
    type: external
    required_by: [gnode-client, gnode-daemon]
    install_check: "systemctl is-active valkey-gnode"
    setup_script: scripts/setup/valkey.sh
    notes: "Not a Geodineum component — installed via package manager"

  gnode-daemon:
    description: "Geometric topology engine, Tera templates, stream processor"
    type: service
    repo: geodineum/gNode
    branch: main
    install_path: gNode
    build_cmd: "cd daemon && cargo build --release"
    service_name: gnode-daemon
    requires: [valkey]
    setup_script: scripts/setup/gnode-daemon.sh
    provides: [topology, tera-rendering, stream-processing, service-discovery]

  gnode-client:
    description: "PHP library for gNode daemon communication"
    type: library
    repo: geodineum/gNode-Client
    branch: main
    install_path: gNode-Client
    requires: [valkey]
    php_extensions: [redis, json]
    provides: [valkey-storage, stream-commands, topology-reading]

  # ─── Framework ────────────────────────────────────────────

  gcore:
    description: "Manager-of-managers PHP framework (WordPress/standalone/Drupal)"
    type: framework
    repo: geodineum/gCore
    branch: main
    install_path: gCore
    requires: [gnode-client]
    optional: [gnode-daemon, gcore-premium]
    php_extensions: [redis, json, mbstring, igbinary, zlib]
    provides: [seo, analytics, security, cookie-consent, pwa-manifest,
               optimization, state-management, template-rendering,
               inference, comms, metrics, topology]
    wp_integration: mu-plugin
    setup_script: scripts/setup/gcore.sh

  gcore-premium:
    description: "Premium gCore modules (SEO, analytics, comms, inference, etc.)"
    type: modules
    repo: geodineum/gCore-Premium
    branch: main
    install_path: premium/gCore
    requires: [gcore]
    optional: true
    notes: "10 modules. Free-tier stubs exist in gCore for graceful degradation."

  # ─── Themes ───────────────────────────────────────────────

  gtemplate-wp:
    description: "WordPress parent theme — shared bootstrap, rendering, REST, integrations"
    type: parent-theme
    repo: geodineum/gTemplate
    branch: main
    install_path: gTemplate-wp
    requires: [gcore]
    provides: [9-phase-bootstrap, 3-tier-rendering, filter-hook-api,
               customizer, rest-api, cli, content-sources]
    wp_integration: theme
    setup_script: scripts/setup/gtemplate-wp.sh

  gcube:
    description: "3D CSS cube child theme (6 faces)"
    type: child-theme
    repo: geodineum/gCube
    branch: main
    install_path: gCube
    requires: [gtemplate-wp]
    wp_integration: theme
    face_count: 6
    geometry: css-3d-transforms

  gtesseract:
    description: "4D tesseract child theme (8 cells)"
    type: child-theme
    repo: geodineum/gTesseract
    branch: main
    install_path: gTesseract
    requires: [gtemplate-wp]
    wp_integration: theme
    face_count: 8
    geometry: css-4d-projection

  giris:
    description: "Three.js twisted toroid child theme (6 sections)"
    type: child-theme
    repo: nierto/gIris
    branch: main
    install_path: gIris
    requires: [gtemplate-wp]
    wp_integration: theme
    face_count: 6
    geometry: threejs-parametric-torus
    cdn_deps: [three.js-r128, gsap-3.12.2]

  # ─── Optional Services ───────────────────────────────────

  gnode-comms:
    description: "Notification daemon (email, Telegram, SMS)"
    type: service
    repo: geodineum/gNode-COMMS
    branch: main
    install_path: gNode-COMMS
    requires: [gnode-daemon, valkey]
    optional: true
    service_name: gnode-comms

  gshield:
    description: "Security templates and WAF rules"
    type: config
    repo: geodineum/gShield
    branch: main
    install_path: gShield
    optional: true

# ─── Profiles ─────────────────────────────────────────────
# Pre-defined component sets for common use cases

profiles:

  minimal:
    description: "WordPress theme only, no real-time features"
    components: [gtemplate-wp, gcore, gnode-client]
    notes: "gCore runs in free-tier mode with stub managers"

  standard:
    description: "Full Geodineum stack with real-time rendering"
    components: [valkey, gnode-daemon, gnode-client, gcore, gtemplate-wp]

  full:
    description: "Everything including premium modules and notifications"
    components: [valkey, gnode-daemon, gnode-client, gcore, gcore-premium,
                 gtemplate-wp, gnode-comms, gshield]
